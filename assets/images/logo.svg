<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1338a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a51d6e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#logoGradient)"/>
  
  <!-- Paw print in white -->
  <!-- Top left toe -->
  <ellipse cx="60" cy="50" rx="18" ry="28" fill="white" transform="rotate(-25 60 50)"/>
  <!-- Top middle-left toe -->
  <ellipse cx="90" cy="35" rx="20" ry="32" fill="white" transform="rotate(-5 90 35)"/>
  <!-- Top middle-right toe -->
  <ellipse cx="120" cy="35" rx="20" ry="32" fill="white" transform="rotate(5 120 35)"/>
  <!-- Top right toe -->
  <ellipse cx="150" cy="50" rx="18" ry="28" fill="white" transform="rotate(25 150 50)"/>
  
  <!-- Main paw pad with heart inside -->
  <circle cx="100" cy="120" r="35" fill="white" stroke="white" stroke-width="8"/>
  
  <!-- Heart shape inside -->
  <path d="M 100 105 C 95 100, 85 100, 85 108 C 85 115, 100 128, 100 128 C 100 128, 115 115, 115 108 C 115 100, 105 100, 100 105" fill="#d1338a"/>
  
  <!-- Small dog head silhouette inside heart -->
  <circle cx="100" cy="115" r="6" fill="#d1338a"/>
  <path d="M 103 110 Q 105 108 107 110" fill="#d1338a"/>
</svg>
